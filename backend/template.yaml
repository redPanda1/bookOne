AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: BookOne backend SAM scaffold (Phase 0)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        DB_HOST: !Ref DbHost
        DB_PORT: !Ref DbPort
        DB_NAME: !Ref DbName
        DB_USER: !Ref DbUser
        DB_PASSWORD: !Ref DbPassword
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_APP_CLIENT_ID: !Ref CognitoAppClientId

Parameters:
  DbHost:
    Type: String
    Default: "aurora-host-placeholder"
  DbPort:
    Type: String
    Default: "5432"
  DbName:
    Type: String
    Default: "bookone"
  DbUser:
    Type: String
    Default: "bookone_user"
  DbPassword:
    Type: String
    Default: "change-me"
    NoEcho: true
  CognitoUserPoolId:
    Type: String
    Default: "us-east-1_placeholder"
  CognitoAppClientId:
    Type: String
    Default: "placeholder-client-id"

Resources:
  BookOneHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: "$default"

  BookOneApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src
      Handler: handlers.app.lambda_handler
      Events:
        RootRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref BookOneHttpApi
            Path: /
            Method: ANY
        CatchAllRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref BookOneHttpApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  HttpApiUrl:
    Description: API Gateway HTTP API endpoint URL
    Value: !Sub "https://${BookOneHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
